name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    name: Lint & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff pytest

      - name: Lint with ruff
        run: ruff check bot/

      - name: Format check with ruff
        run: ruff format --check bot/

      - name: Test with pytest
        env:
          BOT_TOKEN: "0000000000:AAFakeTokenForCITestingOnly1234567"
          DB_PATH: ":memory:"
          STORAGE_ROOT: /tmp/protocols-test
          ADMINS: "123456789"
        run: pytest tests/ -v --no-header

  deploy:
    name: Deploy to Production
    needs: check
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p ${{ secrets.DEPLOY_PORT }} ${{ secrets.DEPLOY_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Deploy
        run: |
          ssh -i ~/.ssh/deploy_key -p ${{ secrets.DEPLOY_PORT }} ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} << 'SCRIPT'
          set -e
          cd /opt/protocols-bot

          echo "=== Pull latest code ==="
          git pull origin main

          echo "=== Update dependencies ==="
          source .venv/bin/activate
          pip install -r requirements.txt --quiet
          deactivate

          echo "=== Restart service ==="
          systemctl restart protocols-bot.service

          echo "=== Health check ==="
          sleep 3
          systemctl is-active protocols-bot.service

          echo "=== Deploy complete ==="
          SCRIPT

      - name: Cleanup
        if: always()
        run: rm -f ~/.ssh/deploy_key
